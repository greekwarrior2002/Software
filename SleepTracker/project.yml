name: SleepTracker
options:
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  SleepTracker:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: SleepTracker
        excludes:
          - "**/*.entitlements"
    resources:
      - SleepTracker/Resources
    entitlements:
      path: SleepTracker/SleepTracker.entitlements
    info:
      path: SleepTracker/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.YOURNAME.sleeptracker
        INFOPLIST_FILE: SleepTracker/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: SleepTracker/SleepTracker.entitlements
    dependencies:
      - framework: HealthKit.framework
        weak: false

  SleepTrackerTests:
    type: bundle.unit-test
    platform: [iOS, macOS]
    sources: SleepTrackerTests
    dependencies:
      - target: SleepTracker
